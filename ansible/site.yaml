---
- name: Configure Server with Docker and CloudWatch
  hosts: all
  become: true
  roles:
    - docker

  tasks:
    - name: Install CloudWatch Agent
      yum:
        name: amazon-cloudwatch-agent
        state: present

    - name: Ensure CloudWatch Agent group exists
      group:
        name: cwagent
        state: present

    - name: Ensure CloudWatch Agent user exists
      user:
        name: cwagent
        groups:
          - cwagent
          - systemd-journal
        shell: /sbin/nologin
        system: yes

    - name: Create empty log files for CloudWatch
      file:
        path: "{{ item }}"
        state: touch
        owner: root
        group: root
        mode: '0644'
      with_items:
        - /var/log/messages
        - /var/log/secure

    - name: Allow cwagent to read logs
      acl:
        path: "{{ item }}"
        entity: cwagent
        etype: user
        permissions: r
        state: present
      with_items:
        - /var/log/messages
        - /var/log/secure

    - name: Set permissions for CloudWatch Agent directories
      file:
        path: "{{ item }}"
        owner: cwagent
        group: cwagent
        state: directory
        recurse: yes
      with_items:
        - /opt/aws/amazon-cloudwatch-agent/etc
        - /opt/aws/amazon-cloudwatch-agent/logs
        - /opt/aws/amazon-cloudwatch-agent/var

    - name: Configure CloudWatch Agent JSON
      copy:
        dest: /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json
        content: |
          {
            "agent": {
              "metrics_collection_interval": 60,
              "run_as_user": "cwagent"
            },
            "logs": {
              "logs_collected": {
                "files": {
                  "collect_list": [
                    {
                      "file_path": "/var/log/messages",
                      "log_group_name": "System_Logs",
                      "log_stream_name": "{instance_id}"
                    },
                    {
                      "file_path": "/var/log/secure",
                      "log_group_name": "Auth_Logs",
                      "log_stream_name": "{instance_id}"
                    }
                  ]
                }
              }
            },
            "metrics": {
              "append_dimensions": {
                "AutoScalingGroupName": "${aws:AutoScalingGroupName}"
              },
              "metrics_collected": {
                "mem": {
                  "measurement": ["mem_used_percent"],
                  "metrics_collection_interval": 60
                }
              }
            }
          }

    - name: Start and Enable CloudWatch Agent
      shell: |
        /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl -a fetch-config -m ec2 -s -c file:/opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json
    - name: Show Web App URL
      debug:
        msg: "The app is live at -> http://{{ ansible_host }}"

    - name: Ensure service is running and enabled
      systemd:
        name: amazon-cloudwatch-agent
        state: restarted
        enabled: yes

    - name: Retrieve GitHub Token from Secrets Manager
      set_fact:
        scm_secrets: "{{ lookup('amazon.aws.aws_secret', 'aws-lab/scm-access') }}"

    - name: Use Token for SCM Configuration
      debug:
        msg: "The token has been successfully recovered for the aws-lab project"
