---
- name: Configure Server with Docker and CloudWatch
  hosts: all
  become: true
  roles:
    - docker

  tasks:
    - name: Install CloudWatch Agent
      yum:
        name: amazon-cloudwatch-agent
        state: present

    - name: Ensure CloudWatch Agent group exists
      group:
        name: cwagent
        state: present

    - name: Ensure CloudWatch Agent user exists
      user:
        name: cwagent
        group: cwagent
        shell: /sbin/nologin
        system: yes

    - name: Set permissions for CloudWatch Agent directories
      file:
        path: "{{ item }}"
        owner: cwagent
        group: cwagent
        state: directory
        recurse: yes
      with_items:
        - /opt/aws/amazon-cloudwatch-agent/etc
        - /opt/aws/amazon-cloudwatch-agent/logs
        - /opt/aws/amazon-cloudwatch-agent/var

    - name: Configure CloudWatch Agent JSON
      copy:
        dest: /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json
        content: |
          {
            "agent": {
              "metrics_collection_interval": 60,
              "run_as_user": "cwagent",
              "omit_hostname": true
            },
            "metrics": {
              "append_dimensions": {
                "AutoScalingGroupName": "${aws:AutoScalingGroupName}"
              },
              "aggregation_dimensions": [["AutoScalingGroupName"]],
              "metrics_collected": {
                "mem": {
                  "measurement": ["mem_used_percent"],
                  "metrics_collection_interval": 60
                }
              }
            }
          }

    - name: Start and Enable CloudWatch Agent
      shell: |
        /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl -a fetch-config -m ec2 -s -c file:/opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json
    - name: Show Web App URL
      debug:
        msg: "The app is live at -> http://{{ ansible_host }}"

    - name: Ensure service is running and enabled
      systemd:
        name: amazon-cloudwatch-agent
        state: started
        enabled: yes