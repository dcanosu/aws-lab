---
- name: Install Docker (AL2023)
  dnf:
    name: docker
    state: present
  notify: Restart Docker

- name: Ensure Docker service is running
  service:
    name: docker
    state: started
    enabled: yes

- name: Add ec2-user to docker group
  user:
    name: ec2-user
    groups: docker
    append: yes

- name: Install Python and Docker dependencies via DNF
  dnf:
    name: 
      - python3-pip
      - python3-requests
      - python3-urllib3
      - python3-docker
    state: present

- name: Create local directory for HTML
  file:
    path: /home/ec2-user/html
    state: directory
    mode: '0755'

- name: Deploy custom index.html
  copy:
    src: index.html
    dest: /home/ec2-user/html/index.html
  tags: [update_web]

- name: Run Nginx container with custom volume
  community.docker.docker_container:
    name: web_app
    image: nginx:latest
    state: started
    restart_policy: always
    published_ports:
      - "80:80"
    volumes:
      - /home/ec2-user/html:/usr/share/nginx/html:ro

- name: Run Nginx container
  community.docker.docker_container:
    name: web_app
    image: nginx:latest
    state: started
    restart_policy: always
    published_ports:
      - "80:80"