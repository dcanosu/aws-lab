name: Infra & SSH Key Sync

on:
  push:
    paths:
      - 'terraform/**'
      - 'terraform-policy.json'
      - 'deploy-github.sh'
      - '.github/workflows/**'

jobs:
  terraform-plan:
    if: contains(github.event.head_commit.modified, 'terraform/') || contains(github.event.head_commit.modified, 'terraform-policy.json')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Plan
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          cd terraform
          terraform init
          terraform plan -no-color
    
  terraform-apply:
    if: needs.terraform-plan.result == 'success'
    runs-on: ubuntu-latest
    needs: terraform-plan
    environment: prod
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init & Apply
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          cd terraform
          terraform init
          terraform apply -auto-approve

      - name: 🔑 Sync SSH Key & ASG Name to GitHub Secrets
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          GH_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
        run: |
          cd terraform
          terraform init -no-color


          PRIVATE_KEY=$(terraform output -raw ssh_private_key)
          gh secret set SSH_PRIVATE_KEY --body "$PRIVATE_KEY"
          
          ASG_NAME=$(terraform output -raw asg_name)
          gh secret set ASG_NAME --body "$ASG_NAME"
          
          echo "Secrets successfully synced to GitHub Actions."

      - name: Wait for SSH to be ready
        run: sleep 30
      
      - name: Trigger Ansible config
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
        run: gh workflow run "Ansible Full Config"